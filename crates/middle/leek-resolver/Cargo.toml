[package]
name        = "leek-resolver"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Name resolution and scope analysis for Leekscript."

[dependencies]
leek-span        = { workspace = true }
leek-syntax      = { workspace = true }
leek-lexer       = { workspace = true }
leek-parser      = { workspace = true }
leek-diagnostics = { workspace = true }
leek-builtins    = { workspace = true }
leek-pipeline    = { workspace = true }
rowan            = { workspace = true }
salsa            = { version = "0.26", optional = true }

[features]
default = []
# Adds a `resolve_query` salsa-tracked entry point that `Resolve::run`
# dispatches to when the pipeline is driven via
# `Pipeline::run_memoized`. `resolve_query` calls `parse_query`, which
# in turn calls `lex_query`, so the whole frontend shares one cached
# parse/lex per (file text, version).
salsa = [
  "dep:salsa",
  "leek-pipeline/salsa",
  "leek-parser/salsa",
  "leek-syntax/salsa",
  "leek-diagnostics/salsa",
  "leek-span/salsa",
]

[dev-dependencies]
leek-hir         = { workspace = true }
leek-diagnostics = { workspace = true }
leek-recipes     = { workspace = true }
leek-pipeline    = { workspace = true }

[lints]
workspace = true
